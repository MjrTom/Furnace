name: 'Daily Test Coverage Improver - Coverage Steps'
description: 'Build project, run tests, and generate coverage reports'

inputs:
  dotnet-version:
    description: '.NET version to use'
    required: false
    default: '6.0.x'

outputs:
  coverage-file:
    description: 'Path to the generated coverage file'
    value: ${{ steps.coverage.outputs.coverage-file }}
  coverage-summary:
    description: 'Coverage summary text'
    value: ${{ steps.coverage.outputs.coverage-summary }}

runs:
  using: 'composite'
  steps:
    - name: Setup dotnet
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Install dependencies
      shell: bash
      run: dotnet restore

    - name: Build (Release)
      shell: bash
      run: dotnet build --configuration Release --no-restore --verbosity normal

    - name: Install ReportGenerator
      shell: bash
      run: dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.1.26

    - name: Run tests with coverage
      id: coverage
      shell: bash
      run: |
        # Create coverage directory
        mkdir -p coverage
        
        # Run tests with coverage
        dotnet test tests/Furnace.Tests --configuration Release --no-build \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=opencover \
          /p:CoverletOutput="$PWD/coverage/coverage.opencover.xml" \
          --logger trx
        
        # Generate HTML coverage report
        $HOME/.dotnet/tools/reportgenerator \
          -reports:"$PWD/coverage/coverage.opencover.xml" \
          -targetdir:"$PWD/coverage" \
          -reporttypes:"Html;TextSummary;Badges"
        
        # Output coverage file path
        echo "coverage-file=$PWD/coverage/coverage.opencover.xml" >> $GITHUB_OUTPUT
        
        # Output coverage summary if it exists
        if [ -f "$PWD/coverage/Summary.txt" ]; then
          echo "coverage-summary<<EOF" >> $GITHUB_OUTPUT
          cat "$PWD/coverage/Summary.txt" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    - name: Upload coverage report as artifact
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: coverage/coverage.opencover.xml
        fail_ci_if_error: false